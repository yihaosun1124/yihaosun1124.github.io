- title: Towards Practical World Model-based Reinforcement Learning for Vision-Language-Action Models
  authors:
    - name: Zhilong Zhang
      equal: true
    - name: Haoxiang Ren
      equal: true
    - name: Yihao Sun
      equal: true
      self: true
    - name: Yifei Sheng
    - name: Haonan Wang
    - name: Haoxin Lin
    - name: Zhichao Wu
    - name: Pierre-Luc Bacon
    - name: Yang Yu
  venue: ICML
  year: 2026
  image: /assets/img/research/vla-mbpo.jpg
  image_alt: Placeholder illustration for the VLA-MBPO research paper
  summary: >-
    VLA-MBPO integrates a series of pratical techniques to train VLAs in world models, including (i) adapting unified multimodal models (UMMs) for data-efficient world modeling; (ii) an interleaved view decoding mechanism to enforce multi-view consistency; and (iii) chunk-level branched rollout to mitigate error compounding.
  links:
    - label: paper
      url: https://arxiv.org/abs/2603.20607
    - label: project page
      url: https://rhx11111.github.io/VLA-MBPO/


