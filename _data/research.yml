- title: Any-step Dynamics Model Improves Future Predictions for Online and Offline Reinforcement Learning
  authors:
    - name: Haoxin Lin
    - name: Yu-Yan Xu
    - name: Yihao Sun
      self: true
    - name: Zhilong Zhang
    - name: Yi-chen Li
    - name: Chengxing Jia
    - name: Yang Yu
  venue: ICLR
  year: 2025
  image: /assets/img/research/adm.jpg
  summary: >-
    In this paper, we propose the Any-step Dynamics Model (ADM) for MBRL to mitigate the compounding error by reducing bootstrapping prediction to direct prediction.We design two algorithms, We then build ADMPO-ON and ADMPO-OFF, which apply ADM in online and offline model-based frameworks, respectively.
  links:
    - label: paper
      url: https://proceedings.iclr.cc/paper_files/paper/2025/file/b0506debbf49e31d25690fbd1e69cd2f-Paper-Conference.pdf
    - label: code
      url: https://github.com/HxLyn3/ADMPO

