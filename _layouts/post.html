---
layout: default
---
<article class="post">
  <p class="back-link"><a href="{{ '/' | relative_url }}">&larr; Back to home</a></p>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
